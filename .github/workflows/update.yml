name: Update Rules

on:
  schedule:
    # 每周一北京时间 06:00 (UTC 周日 22:00)
    - cron: '0 22 * * 0'

  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build rule sets from upstream sources
        run: python3 scripts/build.py --output-dir rules

      - name: Run tests
        run: python3 scripts/test_rules.py --rules-dir rules

      - name: Check for changes
        id: changes
        run: |
          git add rules/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected."
          fi

      - name: Commit and push to dev
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "Auto-update rule sets ($(date -u '+%Y-%m-%d %H:%M:%S') UTC)"
          git push origin dev

      - name: Create or update Pull Request
        if: steps.changes.outputs.changed == 'true'
        run: |
          PR_TITLE="chore: Auto-update rule sets ($(date -u '+%Y-%m-%d %H:%M:%S') UTC)"
          PR_BODY=$(cat <<'EOF'
          ## Automated Rule Set Update

          This PR is auto-generated by GitHub Actions from the latest upstream data sources.

          ### What changed
          - Rebuilt all 7 rule sets from latest upstream data
          - All tests passed (35 checks)

          ### Review checklist
          - [ ] Rule counts look reasonable
          - [ ] No unexpected empty files
          - [ ] Timestamp updated

          ---
          _Merge this PR to update the \`main\` branch. CI will not auto-merge._
          EOF
          )

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --base main --head dev --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, updating title and body..."
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body "$PR_BODY"
            echo "PR_URL=https://github.com/${{ github.repository }}/pull/$EXISTING_PR" >> $GITHUB_ENV
          else
            PR_URL=$(gh pr create --base main --head dev --title "$PR_TITLE" --body "$PR_BODY")
            echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          fi
          echo "::notice::Pull Request: $PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
